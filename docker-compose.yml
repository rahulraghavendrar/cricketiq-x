version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: cricketiq_postgres
    environment:
      POSTGRES_DB: cricketiq
      POSTGRES_USER: cricketiq_user
      POSTGRES_PASSWORD: csk_yellow_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cricketiq_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data: